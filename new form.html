<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>
<style>
    body {
        background-color: #f4f4f9;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    form {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        width: 400px;
    }
    h1 {
        font-size: 22px;
        color: #333;
        margin-bottom: 10px;
    }
    input[type="text"], input[type="email"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
    }
    input[type="submit"] {
        width: 100%;
        background: #007BFF;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }
    input[type="submit"]:hover {
        background: #0056b3;
    }
</style>
</head>
<body>
    <form action="feedback.php" method="post">
        <h1>Name:</h1>
        <input type="text" name="name" required>

        <h1>Email:</h1>
        <input type="email" name="email" required>

        <h1>Feedback:</h1>
        <input type="text" name="feedback" required>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
